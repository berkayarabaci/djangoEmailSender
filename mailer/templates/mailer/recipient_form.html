{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ page_title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'mailer/styles.css' %}">
</head>
<body>
    <main class="page">
        <section class="hero">
            <div>
                <p class="eyebrow">Recipient Form</p>
                <h1>{{ page_title }}</h1>
            </div>
        </section>

        <section class="card form-card">
            <form method="post">
                {% csrf_token %}

                <label for="{{ form.first_name.id_for_label }}">First Name</label>
                {{ form.first_name }}
                {{ form.first_name.errors }}

                <label for="{{ form.last_name.id_for_label }}">Last Name</label>
                {{ form.last_name }}
                {{ form.last_name.errors }}

                <label for="{{ form.email.id_for_label }}">Email</label>
                {{ form.email }}
                {{ form.email.errors }}

                <label for="{{ form.company.id_for_label }}">Company</label>
                {{ form.company }}
                {{ form.company.errors }}

                <label class="checkbox">
                    {{ form.is_active }}
                    <span>{{ form.is_active.label }}</span>
                </label>

                <button type="submit">{{ button_text }}</button>
                <a class="button secondary" href="{% url 'recipient_list' %}">Cancel</a>
            </form>
        </section>
    </main>
</body>
</html>
