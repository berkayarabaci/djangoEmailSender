<!DOCTYPE html>
<html>
<head>
    <title>Delete Recipient</title>
</head>
<body>
    <h1>Delete Recipient</h1>

    <p>
        Are you sure you want to delete
        <strong>{{ recipient.name }} - {{ recipient.email }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'recipient_list' %}">Cancel</a>
    </form>
</body>
</html>
